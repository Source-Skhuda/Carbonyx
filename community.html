<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Community</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Carbonyx</h2>
<a href="dashboard.html">Dashboard</a>
<a href="insights.html">Insights</a>
<a href="community.html">Community</a>
</div>

<main>

<h1>🌍 Community Leaderboard</h1>

<div class="card">
<ul id="leaderboard" class="leaderboard"></ul>
</div>

</main>
</div>

<script>
const API= "https://carbonyx-3.onrender.com";

async function load(){
    const res = await fetch(API+"/api/users");
    const users = await res.json();

    let ranked = users.map(u=>{
        const total = u.activities.reduce((s,a)=>s+a.value,0);
        return {name: u.username, total};
    });

    ranked.sort((a,b)=>a.total-b.total);

    const list = document.getElementById("leaderboard");
    list.innerHTML="";

    ranked.forEach((u,i)=>{
        const li = document.createElement("li");

        if(i===0) li.classList.add("rank-1");
        if(i===1) li.classList.add("rank-2");
        if(i===2) li.classList.add("rank-3");

        li.innerHTML = `
            <span>#${i+1} ${u.name}</span>
            <span>${u.total.toFixed(2)} kg CO₂</span>
        `;

        list.appendChild(li);
    });
}

load();
</script>

</body>
</html>
