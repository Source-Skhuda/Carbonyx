<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<head>
<title>Community</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<div class="sidebar">
<h2>Carbonyx</h2>
<a href="dashboard.html">Dashboard</a>
<a href="insights.html">Insights</a>
<a href="community.html">Community</a>
</div>

<main>

<h1>🌍 Community Leaderboard</h1>

<div class="card">
<h3>Top Eco Users</h3>
<ul id="leaderboard"></ul>
</div>

</main>
</div>

<script>
const API= "";

async function load(){
    const res = await fetch("/api/users");
    const users = await res.json();

    // Calculate totals
    let ranked = users.map(u=>{
        const total = u.activities.reduce((s,a)=>s+a.value,0);
        return {name: u.username, total};
    });

    // Sort LOWEST emissions = best
    ranked.sort((a,b)=>a.total-b.total);

    const list = document.getElementById("leaderboard");
    list.innerHTML="";

    ranked.forEach((u,i)=>{
        const li = document.createElement("li");
        li.innerText = `${i+1}. ${u.name} - ${u.total.toFixed(2)} kg CO₂`;
        list.appendChild(li);
    });
}

load();
</script>
</body>
</html>
