<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbonyx | Community</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2>Carbonyx</h2>
    <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="insights.html">📈 Insights</a>
        <a href="community.html" class="active">🌍 Community</a>
    </nav>
</aside>

<!-- MAIN -->
<main>

<header>
    <h1>🌍 Community Leaderboard</h1>
    <p class="sub">Compare your carbon footprint with others</p>
</header>

<!-- STATS -->
<div class="cards">
    <div class="card">
        <h3>Your Total</h3>
        <p id="yourTotal">0 kg</p>
    </div>

    <div class="card">
        <h3>Community Avg</h3>
        <p id="communityAvg">0 kg</p>
    </div>

    <div class="card">
        <h3>Your Rank</h3>
        <p id="yourRank">-</p>
    </div>
</div>

<!-- LEADERBOARD -->
<div class="card leaderboard-card">
    <h3>🏆 Top Users</h3>
    <ul id="leaderboard" class="leaderboard"></ul>
</div>

</main>
</div>

<script>
const API = "https://carbonyx-3.onrender.com";
const token = localStorage.getItem("token");
const currentUser = JSON.parse(localStorage.getItem("user"));

if(!token){
    window.location.href = "index.html";
}

async function load(){
    try{
        const res = await fetch(API + "/api/users", {
            headers: { Authorization: token }
        });

        const users = await res.json();

        if(!Array.isArray(users)){
            throw new Error("Invalid users response");
        }

        // CALCULATE TOTALS
        let ranked = users.map(u => {
            const total = (u.activities || []).reduce((s,a)=>s+a.value,0);
            return {
                name: u.username,
                total
            };
        });

        // SORT LOWEST = BEST
        ranked.sort((a,b)=>a.total - b.total);

        const list = document.getElementById("leaderboard");
        list.innerHTML = "";

        let totalSum = 0;
        let yourRank = "-";
        let yourTotal = 0;

        ranked.forEach((u,i)=>{
            totalSum += u.total;

            if(u.name === currentUser.username){
                yourRank = i + 1;
                yourTotal = u.total;
            }

            const li = document.createElement("li");

            // TOP 3 STYLING
            if(i === 0) li.classList.add("rank-1");
            else if(i === 1) li.classList.add("rank-2");
            else if(i === 2) li.classList.add("rank-3");

            // CURRENT USER HIGHLIGHT
            if(u.name === currentUser.username){
                li.classList.add("current-user");
            }

            li.innerHTML = `
                <span>#${i+1} ${u.name}</span>
                <span>${u.total.toFixed(2)} kg CO₂</span>
            `;

            list.appendChild(li);
        });

        // STATS
        const avg = ranked.length ? totalSum / ranked.length : 0;

        document.getElementById("communityAvg").innerText = avg.toFixed(2) + " kg";
        document.getElementById("yourTotal").innerText = yourTotal.toFixed(2) + " kg";
        document.getElementById("yourRank").innerText = "#" + yourRank;

    } catch(err){
        console.error(err);
        document.getElementById("leaderboard").innerHTML = "<li>Failed to load leaderboard</li>";
    }
}

load();
</script>

</body>
</html>
