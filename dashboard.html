<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Carbonyx</h2>
<a href="dashboard.html">Dashboard</a>
<a href="insights.html">Insights</a>
<a href="community.html">Community</a>
</div>

<!-- MAIN -->
<main>

<h1 id="name">Welcome</h1>

<div class="cards">
<div class="card">Total: <span id="total">0</span> kg CO₂</div>
<div class="card">Weekly: <span id="weekly">0</span> kg</div>
<div class="card">Status: <span id="status"></span></div>
</div>

<div class="dashboard-grid">

<!-- LEFT -->
<div class="left-panel">

<div class="card">
<h3>Add Activity</h3>
<div class="activity-form">
<select id="cat">
<option value="transport">🚗 Transport</option>
<option value="food">🍖 Food</option>
<option value="energy">⚡ Energy</option>
</select>

<input id="val" type="number" placeholder="kg CO₂">
<button onclick="add()">Add</button>
</div>
</div>

<div class="card">
<h3>Activity Log</h3>
<ul id="list"></ul>
</div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="card chart-card">
<canvas id="chart"></canvas>
</div>

<div class="card insight-card">
<h3>Smart Insights</h3>
<p id="insight"></p>
<p id="edu"></p>
</div>

</div>

</div>

</main>
</div>

<script>
const API = "https://carbonyx-3.onrender.com";

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

// 🔐 PROTECT ROUTE
if(!token || !user){
    alert("Please login again");
    window.location = "index.html";
}

// 👤 USER NAME
document.getElementById("name").innerText = "Welcome, " + user.username;

// ELEMENTS
const totalEl = document.getElementById("total");
const weeklyEl = document.getElementById("weekly");
const statusEl = document.getElementById("status");
const list = document.getElementById("list");
const insight = document.getElementById("insight");
const edu = document.getElementById("edu");

let chart;

// 🔄 LOAD DATA
async function load(){
    try {
        const res = await fetch(API + "/api/activity", {
            headers: { Authorization: token }
        });

        if(!res.ok) throw new Error("Failed to fetch");

        const data = await res.json();

        if(!data.length){
            insight.innerText = "No data yet. Start logging activities.";
            return;
        }

        let total=0;
        let weekly=0;
        let catSum={transport:0,food:0,energy:0};

        list.innerHTML="";
        const today = new Date();

        data.forEach(a=>{
            total+=a.value;

            const d = new Date(a.date);
            if((today-d)/(1000*60*60*24)<=7) weekly+=a.value;

            catSum[a.category]+=a.value;

            const li=document.createElement("li");
            li.innerText = `${a.category} - ${a.value} kg`;
            list.appendChild(li);
        });

        totalEl.innerText = total.toFixed(2);
        weeklyEl.innerText = weekly.toFixed(2);

        // STATUS
        if(total > 80){
            statusEl.innerText = "⚠️ High";
            statusEl.className = "status-bad";
        } else {
            statusEl.innerText = "✅ Good";
            statusEl.className = "status-good";
        }

        // INSIGHTS
        const top = Object.keys(catSum).reduce((a,b)=>
            catSum[a]>catSum[b]?a:b
        );

        insight.innerText = "Top contributor: " + top;

        if(top==="transport"){
            edu.innerText="🚗 Try reducing driving. Use public transport or carpool.";
        }
        else if(top==="food"){
            edu.innerText="🍖 Reduce meat consumption for lower emissions.";
        }
        else{
            edu.innerText="⚡ Save electricity by switching off unused devices.";
        }

        renderChart(catSum);

    } catch(err){
        console.error(err);
        alert("Error loading dashboard");
    }
}

// ➕ ADD ACTIVITY
async function add(){
    const value = parseFloat(document.getElementById("val").value);

    if(!value){
        alert("Enter valid number");
        return;
    }

    await fetch(API + "/api/activity", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            Authorization: token
        },
        body: JSON.stringify({
            category: document.getElementById("cat").value,
            value
        })
    });

    document.getElementById("val").value = "";
    load();
}

// 📊 CHART
function renderChart(data){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"doughnut",
        data:{
            labels:Object.keys(data),
            datasets:[{
                data:Object.values(data),
                backgroundColor:["#3CCF91","#F4D03F","#5DADE2"]
            }]
        }
    });
}

load();
</script>

</body>
</html>
