<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Carbonyx</h2>
<a href="dashboard.html">Dashboard</a>
<a href="insights.html">Insights</a>
<a href="community.html">Community</a>
</div>

<!-- MAIN -->
<main>
<button onclick="toggleTheme()">Light Mode</button>

<h1 id="name"></h1>

<!-- CARDS -->
<div class="cards">
<div class="card">Total: <span id="total">0</span> kg CO₂</div>
<div class="card">Weekly: <span id="weekly">0</span></div>
<div class="card">Status: <span id="status"></span></div>
</div>

<div class="grid">

<!-- LEFT -->
<div>

<div class="card">
<h3>Add Activity</h3>

<div class="activity-form">
<select id="cat">
<option value="transport">🚗 Transport</option>
<option value="food">🍖 Food</option>
<option value="energy">⚡ Energy</option>
</select>

<input id="val" type="number" placeholder="kg CO₂">
<button onclick="add()">Add</button>
</div>

</div>

<div class="card">
<h3>Activity Log</h3>
<ul id="list"></ul>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Insights</h3>
<p id="insight"></p>
<p class="insight" id="edu"></p>
</div>

</div>

</div>
</div>

</main>
</div>

<script>
const API = "";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

document.getElementById("name").innerText = "Welcome, " + user.username;

let chart;

async function load(){
    const res = await fetch("/api/activity",{
        headers:{ Authorization: token }
    });

    const data = await res.json();

    let total=0;
    let weekly=0;
    let catSum={transport:0,food:0,energy:0};

    list.innerHTML="";

    const today = new Date();

    data.forEach(a=>{
        total+=a.value;

        const d = new Date(a.date);
        if((today-d)/(1000*60*60*24)<=7) weekly+=a.value;

        catSum[a.category]+=a.value;

        const li=document.createElement("li");
        li.innerText=a.category+" - "+a.value+" kg";
        list.appendChild(li);
    });

    totalEl.innerText=total.toFixed(2);
    weeklyEl.innerText=weekly.toFixed(2);

    // STATUS
    status.innerText = total > 80 ? "⚠️ High" : "✅ Good";

    // INSIGHTS
    const top = Object.keys(catSum).reduce((a,b)=>
        catSum[a]>catSum[b]?a:b
    );

    insight.innerText = "Top contributor: "+top;

    if(top==="transport"){
        edu.innerText="Driving emits CO₂ due to fuel combustion. Try carpooling or public transport.";
    }
    else if(top==="food"){
        edu.innerText="Meat production has high emissions. Consider plant-based meals.";
    }
    else{
        edu.innerText="Electricity often comes from fossil fuels. Save power where possible.";
    }

    renderChart(catSum);
}

async function add(){
    await fetch("/api/activity",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            Authorization: token
        },
        body: JSON.stringify({
            category: cat.value,
            value: parseFloat(val.value)
        })
    });

    load();
}

function renderChart(data){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"doughnut",
        data:{
            labels:Object.keys(data),
            datasets:[{
                data:Object.values(data)
            }]
        }
    });
}

const totalEl=document.getElementById("total");
const weeklyEl=document.getElementById("weekly");
const status=document.getElementById("status");

load();

function toggleTheme(){
    const current = localStorage.getItem("theme");

    if(current === "light"){
        document.body.classList.remove("light");
        localStorage.setItem("theme","dark");
    } else {
        document.body.classList.add("light");
        localStorage.setItem("theme","light");
    }
}

// LOAD THEME
if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}


</script>

</body>
</html>
