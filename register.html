<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Carbonyx</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="auth-container">

<div class="auth-card">
<h1>Create Account</h1>

<form id="registerForm">
<input id="user" placeholder="Username" required>
<input id="pass" type="password" placeholder="Password" required>
<button class="primary-btn">Register</button>
</form>

<p>Already have an account? <a href="index.html">Login</a></p>
</div>

<script>
const API = "https://carbonyx-3.onrender.com";

registerForm.onsubmit = async (e)=>{
    e.preventDefault();

    const res = await fetch(API + "/api/register", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: user.value,
            password: pass.value
        })
    });

    const data = await res.json();

    if(res.ok){
        alert("Account created!");
        window.location="index.html";
    } else {
        alert(data.message);
    }
};
</script>

</body>
</html>
