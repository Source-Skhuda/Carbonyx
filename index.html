<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbonyx | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="auth-container">

<div class="auth-card">
<h1>Carbonyx</h1>
<p class="tagline">Track your carbon footprint 🌱</p>

<form id="loginForm">
<input id="user" placeholder="Username" required>
<input id="pass" type="password" placeholder="Password" required>
<button class="primary-btn">Login</button>
</form>

<p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
const API = "https://carbonyx-3.onrender.com";

loginForm.onsubmit = async (e)=>{
    e.preventDefault();

    const res = await fetch(API + "/api/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: user.value,
            password: pass.value
        })
    });

    const data = await res.json();

    if(res.ok){
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location="dashboard.html";
    } else {
        alert(data.message);
    }
};
</script>

</body>
</html>
