<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insights</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Carbonyx</h2>
<a href="dashboard.html">Dashboard</a>
<a href="insights.html">Insights</a>
<a href="community.html">Community</a>
</div>

<main>

<h1>📊 Insights</h1>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Analysis</h3>
<p id="analysis"></p>
<p id="tip" class="insight"></p>
</div>

</main>
</div>

<script>
const API = "https://carbonyx-3.onrender.com";
const token = localStorage.getItem("token");

let chart;

async function load(){
    const res = await fetch(API+"/api/activity",{
        headers:{ Authorization: token }
    });

    const data = await res.json();

    let catSum={transport:0,food:0,energy:0};

    data.forEach(a=>{
        catSum[a.category]+=a.value;
    });

    const top = Object.keys(catSum).reduce((a,b)=>
        catSum[a]>catSum[b]?a:b
    );

    document.getElementById("analysis").innerText =
        "Your highest emissions come from: " + top;

    if(top==="transport"){
    edu.innerText="🚗 Transport is your biggest contributor. Try reducing solo trips, use public transport or carpool. Even 1 day less driving per week can significantly lower emissions.";
}
else if(top==="food"){
    edu.innerText="🍖 Food emissions are high. Meat production has a heavy carbon footprint. Consider plant-based meals 2–3 times a week.";
}
else{
    edu.innerText="⚡ Energy usage is high. Switch off unused appliances and consider energy-efficient devices to cut emissions.";
}

    renderChart(catSum);
}

function renderChart(data){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:Object.keys(data),
            datasets:[{
                data:Object.values(data),
                backgroundColor:["#3CCF91","#F4D03F","#5DADE2"]
            }]
        }
    });
}

load();
</script>

</body>
</html>
